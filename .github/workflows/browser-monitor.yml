name: Scheduled browser monitor

on:
  schedule:
    - cron: "40 12 * * *"
      timezone: "Europe/London"
    - cron: "17 0 * * *"
      timezone: "Europe/London"
    - cron: "43 2 * * *"
      timezone: "Europe/London"
    - cron: "8 4 * * *"
      timezone: "Europe/London"
    - cron: "51 6 * * *"
      timezone: "Europe/London"
    - cron: "29 8 * * *"
      timezone: "Europe/London"
    - cron: "56 10 * * *"
      timezone: "Europe/London"
    - cron: "14 12 * * *"
      timezone: "Europe/London"
    - cron: "47 14 * * *"
      timezone: "Europe/London"
    - cron: "22 16 * * *"
      timezone: "Europe/London"
    - cron: "39 18 * * *"
      timezone: "Europe/London"
    - cron: "7 20 * * *"
      timezone: "Europe/London"
    - cron: "53 22 * * *"
      timezone: "Europe/London"
  workflow_dispatch:
    inputs:
      secondary_mode:
        description: Continue to the contextual external article
        required: true
        default: random
        type: choice
        options:
          - random
          - force
          - skip

permissions:
  contents: read

concurrency:
  group: browser-site-monitor
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      TARGET_URL: ${{ secrets.TARGET_URL }}
      SOURCE_URL_1: ${{ secrets.SOURCE_URL_1 }}
      SOURCE_URL_2: ${{ secrets.SOURCE_URL_2 }}
      SOURCE_URL_3: ${{ secrets.SOURCE_URL_3 }}
      SECONDARY_ORIGIN: ${{ secrets.SECONDARY_ORIGIN }}
      SECONDARY_CONTINUE_PROBABILITY: ${{ vars.SECONDARY_CONTINUE_PROBABILITY || '0.4' }}
      SECONDARY_MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.secondary_mode || github.event.schedule == '40 12 * * *' && 'force' || 'random' }}
      BLOCK_ANALYTICS: "true"
      SYNTHETIC_QUERY_PARAM: synthetic_monitor
      PRIVATE_REPORTS_TOKEN: ${{ secrets.PRIVATE_REPORTS_TOKEN }}
      PRIVATE_REPORTS_REPO: ${{ secrets.PRIVATE_REPORTS_REPO }}
      PRIVATE_REPORTS_BRANCH: ${{ secrets.PRIVATE_REPORTS_BRANCH }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Prepare runtime paths
        shell: bash
        run: |
          echo "PRIVATE_REPORT_PATH=$RUNNER_TEMP/private-report.json" >> "$GITHUB_ENV"
          echo "PUBLIC_SUMMARY_PATH=$RUNNER_TEMP/public-summary.json" >> "$GITHUB_ENV"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Run browser monitor
        run: xvfb-run -a node scripts/run-monitor.mjs

      - name: Store detailed report privately
        if: always()
        run: node scripts/push-private-report.mjs

      - name: Publish safe run summary
        if: always()
        shell: bash
        run: |
          node - <<'NODE' >> "$GITHUB_STEP_SUMMARY"
          const fs = require('node:fs');
          const summaryPath = process.env.PUBLIC_SUMMARY_PATH;
          let summary = null;
          try { summary = JSON.parse(fs.readFileSync(summaryPath, 'utf8')); } catch {}
          console.log('## Browser monitor');
          console.log('');
          console.log(`- Status: \`${summary?.status || 'unknown'}\``);
          console.log(`- Profile: \`${summary?.profile || 'unknown'}\``);
          console.log(`- Browser: \`${summary?.browser || 'unknown'}\``);
          console.log(`- Device: \`${summary?.deviceCategory || 'unknown'}\``);
          console.log(`- Primary pages: \`${summary?.primaryPagesVisited ?? 0}\``);
          console.log(`- Secondary selected: \`${summary?.secondarySelected ? 'yes' : 'no'}\``);
          console.log(`- Secondary reached: \`${summary?.secondaryReached ? 'yes' : 'no'}\``);
          console.log(`- Secondary pages: \`${summary?.secondaryPagesVisited ?? 0}\``);
          console.log(`- Total pages: \`${summary?.pagesVisited ?? 0}\``);
          console.log(`- Duration: \`${summary?.durationMs ?? 0} ms\``);
          console.log(`- Error category: \`${summary?.errorCategory || 'none'}\``);
          NODE

      - name: Validate monitor result
        if: always()
        run: |
          node - <<'NODE'
          const fs = require('node:fs');
          let summary = null;
          try { summary = JSON.parse(fs.readFileSync(process.env.PUBLIC_SUMMARY_PATH, 'utf8')); } catch {}
          if (summary?.status !== 'success') process.exit(1);
          NODE

      - name: Remove temporary reports
        if: always()
        run: rm -f "$PRIVATE_REPORT_PATH" "$PUBLIC_SUMMARY_PATH"
