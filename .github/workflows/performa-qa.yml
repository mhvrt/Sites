name: Extended Performa synthetic QA

on:
  schedule:
    - cron: "7,23,41,58 * * * *"
      timezone: "Europe/London"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  performa-qa:
    strategy:
      fail-fast: false
      matrix:
        include:
          - id: bitcash
            feeder: "https://bitcash.dev/"
          - id: bitdova
            feeder: "https://bitdova.com/"
          - id: docstr
            feeder: "https://docstr.app/"
          - id: nftworldnews
            feeder: "https://nftworldnews.tech/"
          - id: subsocket
            feeder: "https://subsocket.io/"
    concurrency:
      group: performa-synthetic-qa-${{ matrix.id }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FEEDER_URL_1: ${{ matrix.feeder }}
      PERFORMA_ORIGIN: "https://performa.com"
      # SYNTHETIC_QUERY_PARAM: "synthetic_monitor"
      # BLOCK_ANALYTICS: "false"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Validate Performa QA script
        run: node --check scripts/run-performa-qa.mjs

      - name: Run extended Performa QA journey
        run: xvfb-run -a node scripts/run-performa-qa.mjs
