name: Extended Performa synthetic QA

on:
  schedule:
    - cron: "1,16,31,46 * * * *"
      timezone: "Europe/London"
    - cron: "4,19,34,49 * * * *"
      timezone: "Europe/London"
    - cron: "10,25,40,55 * * * *"
      timezone: "Europe/London"
    - cron: "13,28,43,58 * * * *"
      timezone: "Europe/London"
    - cron: "6,21,36,51 * * * *"
      timezone: "Europe/London"
  workflow_dispatch:
    inputs:
      feeder:
        description: "Feeder site to run"
        required: true
        default: "bitcash"
        type: choice
        options:
          - bitcash
          - bitdova
          - docstr
          - nftworldnews
          - subsocket

permissions:
  contents: read

jobs:
  performa-qa:
    concurrency:
      group: performa-synthetic-qa-${{ github.event.schedule || inputs.feeder || 'manual' }}
      cancel-in-progress: false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      PERFORMA_ORIGIN: "https://performa.com"
      # SYNTHETIC_QUERY_PARAM: "synthetic_monitor"
      # BLOCK_ANALYTICS: "false"

    steps:
      - name: Select feeder
        shell: bash
        run: |
          case "${{ github.event.schedule }}:${{ inputs.feeder }}" in
            "4,19,34,49 * * * *:"|":bitdova") echo "FEEDER_URL_1=https://bitdova.com/" >> "$GITHUB_ENV" ;;
            "10,25,40,55 * * * *:"|":docstr") echo "FEEDER_URL_1=https://docstr.app/" >> "$GITHUB_ENV" ;;
            "13,28,43,58 * * * *:"|":nftworldnews") echo "FEEDER_URL_1=https://nftworldnews.tech/" >> "$GITHUB_ENV" ;;
            "6,21,36,51 * * * *:"|":subsocket") echo "FEEDER_URL_1=https://subsocket.io/" >> "$GITHUB_ENV" ;;
            *) echo "FEEDER_URL_1=https://bitcash.dev/" >> "$GITHUB_ENV" ;;
          esac

      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install --ignore-scripts --no-audit --no-fund

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox webkit

      - name: Validate Performa QA script
        run: node --check scripts/run-performa-qa.mjs

      - name: Random second jitter
        shell: bash
        run: |
          delay=$((RANDOM % 60))
          echo "Random QA delay: ${delay}s"
          sleep "$delay"

      - name: Run extended Performa QA journey
        run: xvfb-run -a node scripts/run-performa-qa.mjs
