name: One-off verify resilient Performa QA

on:
  push:
    paths:
      - '.github/workflows/performa-verify.yml'

permissions:
  contents: read
  issues: write

jobs:
  verify:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bitcash
            url: https://bitcash.dev/
          - name: bitdova
            url: https://bitdova.com/
          - name: docstr
            url: https://docstr.app/
          - name: nftworldnews
            url: https://nftworldnews.tech/
          - name: subsocket
            url: https://subsocket.io/
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FEEDER_URL_1: ${{ matrix.url }}
      PERFORMA_ORIGIN: https://performa.com
      AI_MAX_DECISIONS: '0'
      BLOCK_ANALYTICS: 'false'
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts --no-audit --no-fund
      - run: npx playwright install --with-deps chromium firefox webkit
      - name: Check and run full QA, always report
        shell: bash
        run: |
          set +e
          : > verify.log
          node --check scripts/run-performa-qa.mjs >> verify.log 2>&1
          syntax_status=$?
          if [ "$syntax_status" -eq 0 ]; then
            xvfb-run -a node scripts/run-performa-qa.mjs >> verify.log 2>&1
            status=$?
          else
            status=$syntax_status
          fi
          {
            echo "### VERIFY ${{ matrix.name }}"
            echo
            echo '```text'
            tail -n 120 verify.log
            echo '```'
            echo
            echo "syntax_exit_code=$syntax_status"
            echo "exit_code=$status"
          } > comment.md
          gh issue comment 5 --repo "${{ github.repository }}" --body-file comment.md
          exit 0
