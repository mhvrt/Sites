name: One-off verify resilient Performa QA

on:
  issues:
    types: [opened]

permissions:
  contents: read
  issues: write

jobs:
  verify:
    if: github.event.issue.title == 'Run Performa QA verification'
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: bitcash
            url: https://bitcash.dev/
          - name: bitdova
            url: https://bitdova.com/
          - name: docstr
            url: https://docstr.app/
          - name: nftworldnews
            url: https://nftworldnews.tech/
          - name: subsocket
            url: https://subsocket.io/
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      FEEDER_URL_1: ${{ matrix.url }}
      PERFORMA_ORIGIN: https://performa.com
      AI_MAX_DECISIONS: '0'
      BLOCK_ANALYTICS: 'false'
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --ignore-scripts --no-audit --no-fund
      - run: npx playwright install --with-deps chromium firefox webkit
      - name: Syntax check
        run: node --check scripts/run-performa-qa.mjs
      - name: Run full QA and report
        shell: bash
        run: |
          set +e
          xvfb-run -a node scripts/run-performa-qa.mjs > verify.log 2>&1
          status=$?
          {
            echo "### VERIFY ${{ matrix.name }}"
            echo
            echo '```text'
            tail -n 100 verify.log
            echo '```'
            echo
            echo "exit_code=$status"
          } > comment.md
          gh issue comment "${{ github.event.issue.number }}" --repo "${{ github.repository }}" --body-file comment.md
          exit 0
